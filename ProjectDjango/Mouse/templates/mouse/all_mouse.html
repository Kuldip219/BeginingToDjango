{% extends "layout.html" %}

{% block title %}
Report Page
{% endblock %}

{% block content %}
    <h1>Welcome to the Report Page</h1>
    <p>This page will contain contents on reports.</p>


<div class="grid grid-cols-3 gap-4 m-4">
    
    {% for page in pages %}
            <div class="bg-indigo-400 rounded-lg shadow-md p-4">
            <img class="rounded-lg" src="{{page.image.url}}" alt="">
            <h3 class="text-2xl py-2 font-bold">{{page.name}}</h3>
        </div>

    {% endfor %}

</div>

{% endblock %}
